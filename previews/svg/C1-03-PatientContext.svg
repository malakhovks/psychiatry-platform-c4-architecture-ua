</defs><rect x="0" y="0" width="1920" height="1080" rx="0" fill="#FFFFFF"/><text x="960.0" y="105.1" text-anchor="middle" font-family="&#x27;Noto Sans&#x27;, &#x27;DejaVu Sans&#x27;, Arial, sans-serif" font-size="42" font-weight="700" fill="#17324D"><tspan x="960.0" dy="0">C1.03 — Контекст ШІ-асистента пацієнта</tspan></text><text x="960.0" y="144.3" text-anchor="middle" font-family="&#x27;Noto Sans&#x27;, &#x27;DejaVu Sans&#x27;, Arial, sans-serif" font-size="22" font-weight="400" fill="#486581"><tspan x="960.0" dy="0">Компактна взаємодія пацієнта і лікаря: скринінг, вимірювання, консультація, супровід і кризова маршрутизація</tspan></text><rect x="220" y="325" width="390" height="330" rx="13" fill="#F8FBFE" stroke="#AFC5D6" stroke-width="2.4" filter="url(#softShadow)"/><rect x="220" y="325" width="390" height="58" rx="13" fill="#E9F2FA"/><rect x="220" y="375" width="390" height="8" rx="0" fill="#E9F2FA"/><line x1="222" y1="383" x2="608" y2="383" fill="none" stroke="#C4D6E4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><text x="234" y="361.1" text-anchor="start" font-family="&#x27;Noto Sans&#x27;, &#x27;DejaVu Sans&#x27;, Arial, sans-serif" font-size="25" font-weight="700" fill="#1F3B53"><tspan x="234" dy="0">Учасники взаємодії</tspan></text><rect x="264" y="421" width="302" height="80" rx="10" fill="#0C7C8C" stroke="#486581" stroke-width="2.2"/><text x="415.0" y="462.1" text-anchor="middle" font-family="&#x27;Noto Sans&#x27;, &#x27;DejaVu Sans&#x27;, Arial, sans-serif" font-size="31" font-weight="700" fill="#FFFFFF"><tspan x="415.0" dy="0">Пацієнт</tspan></text><text x="415.0" y="487.5" text-anchor="middle" font-family="&#x27;Noto Sans&#x27;, &#x27;DejaVu Sans&#x27;, Arial, sans-serif" font-size="14" font-weight="400" fill="#FFFFFF"><tspan x="415.0" dy="0">[Особа]</tspan></text><rect x="264" y="535" width="302" height="80" rx="10" fill="#6C4AB6" stroke="#486581" stroke-width="2.2"/><text x="415.0" y="575.0" text-anchor="middle" font-family="&